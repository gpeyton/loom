# Loom — OpenAI Codex CLI project-scoped configuration
# =====================================================
#
# How Codex resolves configuration
# --------------------------------
# - User-level config lives at `~/.codex/config.toml`. The `~/.codex`
#   directory is Codex's home; setting `$CODEX_HOME` relocates it
#   (`$CODEX_HOME/config.toml` then becomes the user-level config, and
#   auth, sessions, logs, and custom prompts move with it).
# - Codex ALSO natively loads project-scoped overrides from a repo-local
#   `.codex/config.toml` (this file). Discovery is closest-wins from the
#   repo root down to the working directory, and project-scoped layers are
#   only loaded for projects you have marked as TRUSTED in Codex. Project
#   config takes precedence over profiles and user config; CLI flags and
#   `--config` overrides beat everything.
#   Reference: https://developers.openai.com/codex/config-reference
#
# Chosen install mechanism (least surprising)
# -------------------------------------------
# Loom installs this file at `<repo>/.codex/config.toml` and relies on
# Codex's native project-scoped loading: once you trust this project in
# Codex, the MCP server entry below is picked up automatically — no
# copying, no `~/.codex` merge step, no wrapper invocation.
#
# Alternatives (documented for completeness, not the default):
# - `CODEX_HOME="$(pwd)/.codex" codex` — points ALL Codex state (config,
#   auth, sessions, prompts) at the repo copy. It works, but it also moves
#   your auth and session storage into the repo tree; only use it for
#   fully isolated setups.
# - Manually merging the `[mcp_servers.loom]` entry into
#   `~/.codex/config.toml`.
#
# Prompts caveat: Codex reads custom prompts ONLY from
# `$CODEX_HOME/prompts/` (default `~/.codex/prompts/`) — the repo-local
# `.codex/prompts/` directory is NOT scanned. See `.codex/prompts/README.md`
# for the one-time copy/symlink step.
#
# Safety guardrail posture — full autonomy by default (Epic #30 Phase 1, #33;
# inverted from the original sandboxed default shipped in Epic #1 Phase 3 #20)
# ---------------------------------------------------------------------------
# Loom intentionally grants Codex the same unattended authority it already
# grants Claude Code — Claude's Loom default is `--dangerously-skip-permissions`
# (no hook-firing sandbox, no approval prompts). Epic #30 makes Codex match
# that posture: `sandbox_mode = "danger-full-access"` and
# `approval_policy = "never"` are the new defaults below, mirroring what
# `spawn-codex.sh` (#31) now injects for Loom's skip-permissions convention:
# `--dangerously-bypass-approvals-and-sandbox`.
#
# This is PARITY, not a new risk class — see `.codex/GUARDRAIL-PARITY.md` for
# the full trust-boundary rationale (why full autonomy is safe to standardize
# on, and what it means for where you enable Codex workers).
#
# Opting back into the old sandboxed posture (workspace-write confinement,
# no outbound network, approval-on-request) is a per-operator choice: set
# `LOOM_CODEX_SAFE=1` in the environment before spawning Codex workers. That
# env var flips `spawn-codex.sh`'s skip-permissions mapping to `--full-auto`
# instead of the bypass-everything flag. The `[sandbox_workspace_write]`
# table below is retained for exactly that opt-out path — see the comment
# on that table for why it is otherwise inert.
#
# The CI support-role workflow (`.github/workflows/loom-role.yml`) pins
# `codex exec … --sandbox workspace-write` independently of this file and is
# unaffected by this default change.
#
# Full hook-by-hook classification (what `LOOM_CODEX_SAFE=1` restores):
# see `.codex/GUARDRAIL-PARITY.md`.

sandbox_mode = "danger-full-access"
approval_policy = "never"

[sandbox_workspace_write]
# SAFE-MODE-ONLY TABLE: Codex only reads [sandbox_workspace_write] when
# sandbox_mode = "workspace-write". With the loom-default sandbox_mode above
# set to "danger-full-access", Codex ignores this entire table — it has no
# effect on a default Loom-spawned Codex worker. It exists here purely for
# the LOOM_CODEX_SAFE=1 opt-out path: an operator who sets that env var gets
# `spawn-codex.sh --full-auto`, which puts Codex into workspace-write mode,
# at which point these settings become live again. Kept in sync with the old
# safe-by-default posture (no outbound network from the sandbox) so the
# opt-out reproduces the original Epic #1 Phase 3 (#20) guarantees exactly.
network_access = false

# MCP server entry
# ----------------
# The command/args/env for the `loom` MCP server below must match the
# `loom` server entry in Claude Code's `.mcp.json`:
#
#     command: node
#     args:    <loom-checkout>/mcp-loom/dist/index.js
#     env:     LOOM_WORKSPACE=<consumer-repository>
#
# Because mcp-loom lives inside the Loom source checkout (not inside this
# consumer repository), the absolute paths are machine-specific and cannot
# ship pre-filled. `scripts/setup-mcp.sh --codex` configures the Loom source
# repository itself; it does not currently accept a consumer target. For a
# consumer install, uncomment the template below and substitute both paths:
#
# [mcp_servers.loom]
# command = "node"
# args = ["/path/to/loom/mcp-loom/dist/index.js"]
#
# [mcp_servers.loom.env]
# LOOM_WORKSPACE = "/path/to/consumer-repository"
