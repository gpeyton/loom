name: Loom Judge

# Periodic support role for the Loom orchestration system.
#
# Judge evaluates PRs labeled `loom:review-requested` and either approves
# (moving them to `loom:pr`) or requests changes (moving them to
# `loom:changes-requested`).
#
# Cadence: every 5 minutes (matches the daemon's historical interval).
#
# This is a thin caller of the reusable `loom-role.yml` workflow. The runtime
# (claude | codex) is chosen per-run via workflow_dispatch; scheduled runs use
# the claude default.
#
# Disabled by default. To enable on your fork:
#   1. Uncomment the `schedule:` block below.
#   2. Add the secret required for your runtime:
#      - claude runtime (default): CLAUDE_API_KEY
#      - codex runtime: OPENAI_API_KEY
#      (Settings -> Secrets and variables -> Actions).
#
# This is Phase 2a of the shepherd/daemon deprecation epic (#3372 / #3375);
# dual-runtime support is Epic #1 Phase 2 (#13).

on:
  # schedule:
  #   # Uncomment and set the runtime's API-key secret to enable.
  #   - cron: "*/5 * * * *"
  workflow_dispatch:  # Allow manual runs for testing.
    inputs:
      runtime:
        description: "Worker runtime for this run."
        type: choice
        options:
          - claude
          - codex
        default: claude

jobs:
  judge:
    uses: ./.github/workflows/loom-role.yml
    # Judge only comments and edits labels on PRs (loom:review-requested ->
    # loom:pr / loom:changes-requested). It never touches issues, so `issues`
    # is dropped (#32, epic #30 Phase 1 -- least-privilege GITHUB_TOKEN per
    # role).
    permissions:
      pull-requests: write
    with:
      role: judge
      runtime: ${{ inputs.runtime || 'claude' }}
      model: claude-opus-4-8
    secrets: inherit
